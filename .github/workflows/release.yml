name: Release

# 发版流程：
#   1. 本地 bump Cargo.toml 的版本号并提交
#   2. 打与版本号完全一致的 tag（纯数字，无 v 前缀，沿用历史约定），例如：
#        git tag 1.0.17 && git push github 1.0.17
#   3. 本流水线在 Windows runner 上编译 release exe、用 Inno Setup 打安装包，
#      并创建同名 GitHub Release、上传 md-viewer-setup-v{version}.exe 资产。
#   app 端自动更新会读取该 Release 的 tag_name 与安装包资产 URL。
#
# 也支持手动触发（workflow_dispatch）：不填版本则用 Cargo.toml 中的版本，
# 并据此创建 tag 与 Release。

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.17；留空则用 Cargo.toml 中的版本）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $cargo = (Select-String -Path 'Cargo.toml' -Pattern '^\s*version\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"' |
                    Select-Object -First 1).Matches[0].Groups[1].Value
          if (-not $cargo) { Write-Error 'Cargo.toml 中未找到版本号'; exit 1 }
          if ('${{ github.ref_type }}' -eq 'tag') {
            $ver = '${{ github.ref_name }}'
            if ($ver -ne $cargo) {
              Write-Error "Tag ($ver) 与 Cargo.toml 版本 ($cargo) 不一致，请先同步后再打 tag。"
              exit 1
            }
          } elseif ('${{ github.event.inputs.version }}' -ne '') {
            $ver = '${{ github.event.inputs.version }}'
          } else {
            $ver = $cargo
          }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release version: $ver"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release exe
        run: cargo build --release

      - name: Stage exe for installer
        shell: pwsh
        run: Copy-Item target/release/md-viewer.exe md-viewer.exe -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { Write-Error "未找到 ISCC.exe：$iscc"; exit 1 }
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" installer.iss
          if ($LASTEXITCODE -ne 0) { exit 1 }
          $out = "dist/md-viewer-setup-v${{ steps.ver.outputs.version }}.exe"
          if (-not (Test-Path $out)) { Write-Error "安装包未生成：$out"; exit 1 }
          Write-Host "Installer: $out"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: md-viewer v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/md-viewer-setup-v${{ steps.ver.outputs.version }}.exe
